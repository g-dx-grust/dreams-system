name: CI

on:
  pull_request: {}
  push:
    branches: [main]

jobs:
  lint-type-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm type-check

      - name: Unit tests
        run: pnpm test -- --run

      # E2E は Vercel Preview URL が必要なため初期は省略
      # - name: E2E tests
      #   run: pnpm test:e2e
